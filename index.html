<div class="box" id="question"></div>

"Vị trí <b>Thực Tập Sinh Quan Hệ Khách Hàng Doanh Nghiệp</b> của Chailease tuyển dụng ở những tỉnh/thành nào?</b><br><br>Quyền lợi ở vị trí này ra sao?",
"<b>Cuối năm 2022 tới hiện tại</b>, Chailease Việt Nam đứng thứ mấy trên thị trường Cho thuê tài chính? Với <b>số vốn điều lệ</b> là bao nhiêu?",
"Chailease Việt Nam vinh dự nhận giải thưởng gì tại <b>Asia Pacific Enterprise Awards (APEA) 2024</b>?",
"Vị trí <b>Nhân Viên Quan Hệ Khách Hàng Doanh Nghiệp</b> của Chailease tuyển dụng ở những tỉnh/thành nào?</b><br><br>Quyền lợi ở vị trí này ra sao?",
"Khi hợp tác với Chailease, doanh nghiệp có thể <b>bán</b> tài sản cố định và <b>thuê tài chính lại</b> tài sản cố định đó hay không?</b><br><br>Nếu có, tên của hình thức đó là gì?",
];

const saved = sessionStorage.getItem("question");

if (saved) {
  document.getElementById("question").innerHTML = saved;
} else {
  const randomIndex = Math.floor(Math.random() * questions.length);
  const q = questions[randomIndex];
  document.getElementById("question").innerHTML = q;
  sessionStorage.setItem("question", q);
}
 
  window.onbeforeunload = function() {
  return "Bạn chắc muốn rời trang?";
};
</script>

</body>
</html>
