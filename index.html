<!DOCTYPE html>
<html>
<head>
  <title>Chailease Mini Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 40px;
      background-color: #f5f5f5;
    }
    .box {
      font-size: 22px;
      border: 2px solid #333;
      padding: 25px;
      border-radius: 10px;
      background-color: white;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      background-color: #007bff;
      color: white;
    }
  </style>
</head>

<body>

<h2>🎯 Trả lời câu hỏi để nhận quà "dưỡng thê" từ Chailease. Đừng ngần ngại dùng sự trợ giúp từ Google nhé ^^ </h2>

<div class="box" id="question"></div>

<script>
const questions = [
"Các sản phẩm chính của Cho thuê tài chính tại Chailease là gì?</b><br><br>Tài sản thuê tài chính tại Chailease có bao gồm <b>bất động sản</b> không?",
"Cho thuê tài chính là gì?",
"Trong <b>tháng 3/2024</b>, Chailease đã ký kết khoản vay hợp vốn với 8 ngân hàng khác, số tiền ký kết là bao nhiêu <b>triệu USD?</b>",
"Những lợi ích khi khách hàng hợp tác với Chailease?",
"Thời hạn cho thuê tài chính của 1 tài sản tại Chailease thường là bao lâu? <b>(tính theo năm)</b>",
"Chailease hoạt động trong lĩnh vực cho thuê tài chính theo hình thức <b>cho vay tiền mặt</b> hay <b>cho thuê máy móc trang thiết bị?</b>",
"Chailease được Ngân Hàng Nhà Nước Việt Nam cấp giấy phép thành lập và bắt đầu đi vào hoạt động tại Việt Nam vào năm nào?",
"Nêu <b>3 lý do</b> vì sao nên chọn Chailease để thuê tài chính?",
"Kể tên ít nhất <b>4 dịch vụ bảo hiểm</b> của Chailease hiện nay",
"Logo của công ty Chailease được thiết kế bằng cách ráp 4 chữ cái nào? Ý nghĩa?",
"Chailease đã hoạt động tại VN từ năm nào? Tính đến nay là bao nhiêu năm?",
"Giá trị cốt lõi của Chailease là gì?",
"Kể tên các <b>trụ sở, chi nhánh và văn phòng đại diện</b> của Chailease tại Việt Nam</b><br><br>(gợi ý nhỏ: câu trả lời chỉ đúng khi xem tại website <b>chailease.com.vn</b>)",
"Hiện tại dịch vụ cho thuê tài chính của Chailease có bao nhiêu hình thức? Kể tên",
"Kể tên 2 điều kiện để được cho thuê tài chính tại Chailease?",
"Chailease Việt Nam có bao nhiêu <b>văn phòng đại diện</b>? Tại các tỉnh/thành nào?</b><br><br>(gợi ý nhỏ: câu trả lời chỉ đúng khi xem tại website <b>chailease.com.vn</b>)",
"Chailease có cho khách hàng <b>vay tiền mặt</b> không?</b><br><br>Nếu không thì hình thức hỗ trợ vốn của Chailease đối với khách hàng là gì?", 
];

const saved = sessionStorage.getItem("question");

if (saved) {
  document.getElementById("question").innerHTML = saved;
} else {
  const randomIndex = Math.floor(Math.random() * questions.length);
  const q = questions[randomIndex];
  document.getElementById("question").innerHTML = q;
  sessionStorage.setItem("question", q);
}
 
  window.onbeforeunload = function() {
  return "Bạn chắc muốn rời trang?";
};
</script>

</body>
</html>
